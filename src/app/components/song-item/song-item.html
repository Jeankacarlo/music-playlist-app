<div class="song-item" [class.playing]="isPlaying" (click)="play()">
  <div class="song-index">
    <span class="number" *ngIf="!isPlaying">{{ index }}</span>
    <span class="bars" *ngIf="isPlaying">🎵</span>
  </div>

  <div class="song-cover">
    <img
      *ngIf="song.coverUrl"
      [src]="song.coverUrl"
      [alt]="song.title"
    />
    <div class="no-cover" *ngIf="!song.coverUrl">🎵</div>
  </div>

  <div class="song-info">
    <span class="title">{{ song.title }}</span>
    <span class="artist">{{ song.artist }}</span>
  </div>

  <div class="song-actions">
    <span class="duration">{{ song.duration }}</span>

    <ng-container *ngIf="!confirmingDelete">
      <button type="button" class="btn-delete" *ngIf="canModify" (click)="requestDelete($event)">Eliminar canción</button>
    </ng-container>

    <div class="delete-confirmation" *ngIf="confirmingDelete" (click)="$event.stopPropagation()">
      <span>¿Eliminar esta canción?</span>
      <button type="button" class="btn-confirm" (click)="confirmDelete($event)">Sí</button>
      <button type="button" class="btn-cancel" (click)="cancelDelete($event)">No</button>
    </div>
  </div>
</div>
